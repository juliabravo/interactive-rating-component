<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Interactive Rating Component</title>
</head>

<body>
    <div class="container">
        <div class="circle">
            <img src="./images/icon-star.svg" alt="">
        </div>
        <h1>How did we do?</h1>
        <p>Please let us know how we did with your support request. All feedback is appreciated to help us improve our
            offering!</p>
        <div class="rating">
            <div class="num circle">1</div>
            <div class="num circle">2</div>
            <div class="num circle">3</div>
            <div class="num circle">4</div>
            <div class="num circle">5</div>
        </div>
        <a href="#" class="submit-btn">SUBMIT</a>
    </div>
    <script src="app.js"></script>
</body>

</html>
